<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe Web Application</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero-panel" aria-label="Game introduction">
      <p class="eyebrow">Prodigy Infotech Task-03</p>
      <h1>Tic-Tac-Toe</h1>
      <p class="intro">Play a quick match, track turns, and reset the board anytime.</p>
      <div class="score-grid" aria-label="Score board">
        <article>
          <span>X</span>
          <strong id="xScore">0</strong>
        </article>
        <article>
          <span>Draw</span>
          <strong id="drawScore">0</strong>
        </article>
        <article>
          <span>O</span>
          <strong id="oScore">0</strong>
        </article>
      </div>
    </section>

    <section class="game-panel" aria-label="Tic-Tac-Toe game board">
      <div class="status-row">
        <div>
          <p class="label">Current turn</p>
          <h2 id="statusText">Player X</h2>
        </div>
        <button id="resetScoreButton" class="ghost-button" type="button">Reset Score</button>
      </div>

      <div class="mode-row" aria-label="Game mode">
        <button id="playerModeButton" class="mode-button active" type="button">2 Players</button>
        <button id="aiModeButton" class="mode-button" type="button">Play vs AI</button>
      </div>

      <div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe board">
        <button class="cell" type="button" role="gridcell" aria-label="Cell 1"></button>
        <button class="cell" type="button" role="gridcell" aria-label="Cell 2"></button>
        <button class="cell" type="button" role="gridcell" aria-label="Cell 3"></button>
        <button class="cell" type="button" role="gridcell" aria-label="Cell 4"></button>
        <button class="cell" type="button" role="gridcell" aria-label="Cell 5"></button>
        <button class="cell" type="button" role="gridcell" aria-label="Cell 6"></button>
        <button class="cell" type="button" role="gridcell" aria-label="Cell 7"></button>
        <button class="cell" type="button" role="gridcell" aria-label="Cell 8"></button>
        <button class="cell" type="button" role="gridcell" aria-label="Cell 9"></button>
      </div>

      <div class="actions">
        <button id="newRoundButton" class="primary-button" type="button">New Round</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
